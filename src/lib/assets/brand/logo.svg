    <line x1="64" y1="182" x2="256" y2="182" />
    <line x1="58" y1="190" x2="262" y2="190" />
  </g>
  <!-- divisor -->
  <line x1="300" y1="60" x2="300" y2="180" stroke="#9aa6b4" stroke-width="2" />
  <!-- texto -->
  <text x="330" y="118" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="700" letter-spacing="2" fill="#1f3a63">PROENZA</text>
  <text x="332" y="172" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="400" letter-spacing="12" fill="#8a97a6">ABOGADOS</text>
