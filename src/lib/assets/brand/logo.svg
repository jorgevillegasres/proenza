    <path d="M86 78 a26 26 0 0 1 52 0" />
    <line x1="112" y1="44" x2="112" y2="52" />
    <circle cx="112" cy="40" r="3" fill="#1f3a63" stroke="none" />
    <!-- frontón / cornisa superior -->
    <path d="M150 78 l28 -20 l28 20" />
    <line x1="70" y1="86" x2="250" y2="86" />
    <line x1="74" y1="96" x2="246" y2="96" />
    <!-- columnas -->
    <line x1="86" y1="98" x2="86" y2="176" />
    <line x1="110" y1="98" x2="110" y2="176" />
    <line x1="134" y1="98" x2="134" y2="176" />
    <line x1="178" y1="98" x2="178" y2="176" />
    <line x1="202" y1="98" x2="202" y2="176" />
    <line x1="226" y1="98" x2="226" y2="176" />
    <!-- entrepiso -->
    <line x1="74" y1="138" x2="246" y2="138" />
    <!-- arcos planta baja -->
    <path d="M90 176 v-22 a8 8 0 0 1 16 0 v22" />
